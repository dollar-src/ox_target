<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #menu-card {
            display: flex;
            flex-direction: column;
            background: rgba(8, 8, 12, 0.92);
            border: 1px solid rgba(161, 159, 251, 0.25);
            border-radius: 10px;
            min-width: 220px;
            max-width: 300px;
            overflow: hidden;
            width: 100%;
            padding: 8px;
        }

        .option-row {
            display: flex;
            align-items: center;
            padding: 11px 15px;
            border-radius: 7px;
            color: rgba(255, 255, 255, 0.75);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: background 0.15s ease, color 0.15s ease;
            gap: 14px;
        }

        .option-row:not(:last-child) {
            border-bottom: 1px solid rgba(161, 159, 251, 0.07);
        }

        .option-row i {
            color: #a19ffb;
            font-size: 15px;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
            filter: drop-shadow(0 0 4px rgba(161, 159, 251, 0.5));
        }

        /* Active/hovered row (controlled via JS message) */
        .option-row.active {
            background: rgba(161, 159, 251, 0.12);
            color: #ffffff;
        }
    </style>
</head>

<body>
    <div id="menu-card"></div>
    <script>
        const card = document.getElementById('menu-card');

        window.addEventListener('message', (event) => {
            const data = event.data;

            if (data.event === 'setOptions') {
                card.innerHTML = '';
                (data.options || []).forEach((opt) => {
                    if (opt.hide) return;
                    const row = document.createElement('div');
                    row.className = 'option-row';
                    row.innerHTML = `
              <i class="fa-fw ${opt.icon || 'fa-solid fa-circle'}"></i>
              <span>${opt.label || ''}</span>
            `;
                    card.appendChild(row);
                });
            }

            if (data.event === 'clear') {
                card.innerHTML = '';
            }
        });
    </script>
</body>

</html>
